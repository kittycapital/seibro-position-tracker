name: SEIBro 외화증권 데이터 수집

on:
  schedule:
    - cron: '30 0 * * 1-5'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Pull latest
        run: git pull origin main || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests yfinance

      - name: Collect SEIBro data
        run: python scripts/scraper.py --real

      - name: Resolve tickers
        run: python scripts/resolve_tickers.py

      - name: Generate dashboard JSON
        run: python scripts/generate_dashboard.py

      - name: Commit and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data/
          git diff --staged --quiet || git commit -m "📊 SEIBro update $(date +%Y-%m-%d)"
          git push --force
